services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmgmt_api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/TaskManagementDb"
      Jwt__Secret: "${JWT_SECRET:-SuperSecretKeyForDevelopmentPurposeOnly1234567890!}"
      Jwt__Issuer: "${JWT_ISSUER:-TaskMgmtApi}"
      Jwt__Audience: "${JWT_AUDIENCE:-TaskMgmtClient}"
    volumes:
      # Persist the SQLite database file outside the container
      - taskmgmt_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  taskmgmt_data:
